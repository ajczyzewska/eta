# nginx location blocks for the audiobook server on mydevil
#
# Add these location blocks inside your server { } block.
# Assumes:
#   /srv/audiobooks/  — MP3 files and manifest.json (uploaded by deploy.sh)
#   /srv/player/      — PWA static files (uploaded by npm run build + rsync)
#
# Recommended: add to your server { } block:
#   add_header X-Content-Type-Options "nosniff" always;

# manifest.json — revalidate on every request (updated by deploy.sh on each push)
location = /audiobooks/manifest.json {
    alias /srv/audiobooks/manifest.json;
    add_header Cache-Control "no-cache";
}

# MP3 files — write-once after upload, immutable caching is safe
# Capture group required: regex + alias needs $1 for correct path rewriting
# Character class restricts traversal: slug/filename pattern only
location ~* ^/audiobooks/([a-z0-9_-]+/[^/]+\.mp3)$ {
    alias /srv/audiobooks/$1;
    add_header Cache-Control "public, max-age=31536000, immutable";
    gzip off;
}

# Other /audiobooks/ paths (slug subdirs, meta.json)
location /audiobooks/ {
    alias /srv/audiobooks/;
    autoindex off;
}

# PWA static files with SPA fallback
location /player/ {
    alias /srv/player/;
    autoindex off;
    try_files $uri /player/index.html =404;
}
