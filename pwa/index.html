<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#18181b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/player/manifest.webmanifest" />
    <title>Audiobook Player</title>
    <style>
      /* ── Reset ──────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%; overflow: hidden;
        background: #09090b; color: #fafafa;
        font-family: system-ui, -apple-system, sans-serif;
        -webkit-tap-highlight-color: transparent;
        font-size: 18px;
      }

      /* ── Loading screen ─────────────────────────────────────────── */
      #loading {
        display: flex; align-items: center; justify-content: center;
        height: 100vh; font-size: 1.8rem; color: #bbb;
      }

      /* ── App shell ──────────────────────────────────────────────── */
      #app {
        display: flex; flex-direction: column;
        height: 100vh; padding: 16px; gap: 12px;
      }
      #app.hidden, .hidden { display: none !important; }

      /* ── Now playing ────────────────────────────────────────────── */
      #now-playing {
        text-align: center; padding: 4px 0;
        background: #18181b; border-radius: 16px;
        padding: 14px 16px; border: 1px solid #27272a;
      }
      #book-title { font-size: 1.7rem; font-weight: 700; line-height: 1.3; color: #ffffff; }
      #chapter-title { font-size: 1.2rem; color: #a1a1aa; margin-top: 6px; min-height: 1.4em; }

      /* ── Progress bar ───────────────────────────────────────────── */
      #progress-wrap {
        position: relative; height: 56px;
        display: flex; align-items: center;
      }
      #progress-bar {
        width: 100%; height: 16px; background: #27272a;
        border-radius: 8px; overflow: hidden; pointer-events: none;
      }
      #progress-fill { height: 100%; background: #e94560; width: 0%; }
      #progress-seek {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        opacity: 0; cursor: pointer; margin: 0;
      }
      #time-display {
        display: flex; justify-content: space-between;
        font-size: 1.2rem; color: #a1a1aa; margin-top: 4px;
        font-weight: 600;
      }

      /* ── Buttons ────────────────────────────────────────────────── */
      #controls, #chapter-nav { display: flex; gap: 10px; }
      button {
        flex: 1; min-height: 100px;
        background: #18181b; color: #f0f0f0;
        border: 2px solid #3f3f46; border-radius: 16px;
        font-size: 1.25rem; font-family: inherit; font-weight: 600;
        cursor: pointer; user-select: none; -webkit-user-select: none;
        transition: background 0.1s;
        line-height: 1.3;
      }
      button:active { background: #3f3f46; }
      #btn-play-pause {
        background: #e94560; border-color: #e94560;
        font-weight: 700; font-size: 2.2rem; flex: 1;
        min-height: 140px;
      }
      #btn-play-pause:active { opacity: 0.85; background: #e94560; }

      /* ── Buffering indicator ────────────────────────────────────── */
      #spinner {
        text-align: center; color: #a1a1aa;
        font-size: 1.1rem; min-height: 1.6em;
      }

      /* ── Book + chapter lists ───────────────────────────────────── */
      #lists-section {
        display: flex; gap: 10px; flex: 1;
        overflow: hidden; min-height: 0;
      }
      .panel {
        flex: 1; display: flex; flex-direction: column;
        overflow: hidden; background: #18181b;
        border-radius: 16px; border: 2px solid #27272a;
      }
      .panel h3 {
        padding: 12px 18px; font-size: 1rem; color: #a1a1aa;
        text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
        border-bottom: 2px solid #27272a; flex-shrink: 0;
      }
      .panel ul {
        list-style: none; overflow-y: auto; flex: 1;
        overscroll-behavior: contain;
      }
      .panel ul li {
        padding: 16px 18px; font-size: 1.1rem;
        cursor: pointer; border-bottom: 1px solid #27272a;
        display: flex; align-items: center;
        min-height: 70px; user-select: none; -webkit-user-select: none;
        line-height: 1.4; font-weight: 500;
      }
      .panel ul li:active { background: #3f3f46; }
      .panel ul li.active {
        background: #3f3f46; color: #e94560;
        font-weight: 700; font-size: 1.15rem;
      }
    </style>
  </head>
  <body>
    <div id="loading">Ładowanie...</div>

    <div id="app" class="hidden">
      <!-- Now playing -->
      <div id="now-playing">
        <div id="book-title">—</div>
        <div id="chapter-title"></div>
      </div>

      <!-- Progress -->
      <div id="progress-wrap">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <input type="range" id="progress-seek" min="0" max="100" value="0" step="0.1" />
      </div>
      <div id="time-display">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
      </div>

      <!-- Transport controls -->
      <div id="controls">
        <button id="btn-play-pause">▶ ODTWÓRZ</button>
      </div>
      <div id="chapter-nav">
        <button id="btn-prev-chapter">◀ Poprzedni<br>rozdział</button>
        <button id="btn-next-chapter">Następny<br>rozdział ▶</button>
      </div>

      <!-- Buffering spinner -->
      <div id="spinner" class="hidden">Ładowanie audio...</div>

      <!-- Book + Chapter lists -->
      <div id="lists-section">
        <div class="panel">
          <h3>Książki</h3>
          <ul id="books-list"></ul>
        </div>
        <div class="panel">
          <h3>Rozdziały</h3>
          <ul id="chapters-list"></ul>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
